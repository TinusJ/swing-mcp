name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test (with virtual display)
        run: xvfb-run --auto-servernum mvn -B verify

      - name: Upload agent jar
        uses: actions/upload-artifact@v4
        with:
          name: swing-mcp-agent
          path: swing-mcp-agent/target/swing-mcp-agent-*.jar
          if-no-files-found: error

      - name: Upload server jar
        uses: actions/upload-artifact@v4
        with:
          name: swing-mcp-server
          path: swing-mcp-server/target/swing-mcp-server-*.jar
          if-no-files-found: error
